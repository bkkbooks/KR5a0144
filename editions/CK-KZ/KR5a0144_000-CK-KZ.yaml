front:
  text: 悟眞篇直指詳說
  hash: sha256:12965edbb1f3c2fae926add3f8aa987b1ae95974715752a811a565a24276cd2a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0144_CK-KZ_01p041a, image: JY177/CK-KZ_JY177_01p041a.png}
body:
  text: 無名子翁葆光著夫渾沌未顯之前虛無寂寞無名可宗强名曰道道降而生一炁非動非靜非濁非淸邈不可測聖人强言謂之混元眞一之炁一炁旣判化爲陰陽陰陽者天地也男女者也天地絪緼萬物化醕男女媾精萬物化生故自有天地以來未有一物不因陰陽相交而得其形者夫欲修煉者若以金石草木之象名萬有不同之器類以至一身精神氣血液之屬而爲丹質者此皆後天地生滓質之物也滓質之物有形可覩安能生有形而入於無形也哉後天地生者皆不離乎天地之內而有形者未嘗不壞安能變化而超乎天地之外也哉不超乎天地之外而有形者未始不墮於陰陽生死之數者也夫陽主生陰主死一死一生一往一復此理之自然也設使煅煉得法服餌有功壽等龜齡年齊鶴算及其數盡未有不亡若箭之射空力盡必墜謂其有形未有不壞之理是故聖人採先天一炁爲丹煉形還歸於一氣煉氣歸神煉神合道而歸於無形之形故能超乎天地之外立乎造化之表掌握陰陽挈提天地陰陽生死之所變者先天一炁使之然也故得丹體常靈常存不生不滅矣譬如運甕處甕之內焉能運甕必也處甕之外則能運甕矣眞一之炁生於天地之先邈不可測聖人以同類之物誘之成丹亦猶日中有火以陽燧引之則得其火矣又如月中有水以方諸引之則得其水矣故假同類之物立爲爐鼎號曰眞龍眞虎故呂公詞有自然爐鼎虎繞與龍蟠之語也夫同類者無情之情不色之色也萬物之中得其性命之正爲靈爲貴之最者也假如初弦之氣運而用之故號曰眞鉛眞汞也仙翁曰時人要識眞鉛汞不是凡砂及水銀乃初弦鉛之氣也初弦者上下弦二八之數也龍稱八兩虎重半斤所以謂之二八也此時水源至淸有氣而無質者也以此氣類而誘之則眞一之炁降靈而有象也仙翁曰藥逢氣類方成象道在虛無合自然也夫煉此金丹先求名山福地次剙丹室數椽壇築三層劍卓四面懸之以鏡方乃立龍虎爲鼎爐置刻漏爲規矩抽添有水火之則作用有輔弼之儔如此之類未易敷陳亦假世財方克就緒故陰眞君論曰欲修此道須假資財如無資財則修金丹不成又須三人爲侶方可修煉三人同心一志之良友也密當八月首望之宵一陽初動之際當先主者禹步登壇左手擒龍右手擒虎精調氣候數按周星正配陰陽息符漏刻故得金水交倂龍木孕英矣一者坐幄運籌經文緯武而繼其中間首尾之所施不使毫釐差忒故仙翁曰大都全藉修持力毫髮差殊不作丹也一者濳窺刻漏之的密整抽添之用準備火工無失復卦逾時過刻丹必難成故朝元子曰勸君窮取周天數莫使蹉跎復卦催三人一心遞互相符不半時辰立得眞一之炁歸於交感之宮結成一粒大如黍珠號曰金丹現在北海之中赫然光透簾幃卽時密運鏌鎁以追之纔得入口則立躋聖位矣故仙翁曰一粒金丹吞入腹方知我命不由天得此一粒鎭在丹田氣海之中則一身精氣翕然而歸之立結成砂而不走失然後運火煅煉成金液還丹夫火者陰陽之氣也陽數奇陰數偶自子至巳六辰屬陽故謂之陽火自午至亥六辰屬陰故謂之陰符乾之策二百一十有六坤之策一百四十有四二篇之中奪得四千三百二十年正氣歸我丹田之中温養子珠結就聖胎也老君曰陽奇自子生陰偶從午發終始在乾坤中冥母胎月故得外積陰陽之火內生金液之質不假施功自然運轉從尾閭厯厯然有聲直透雙關逆上泥丸峰頂降下口中狀如雀卵馨香甘美此乃金液還丹也徐徐咽下丹田結成聖胎養就嬰兒故仙翁曰嬰兒是一含眞氣十月胎圓入聖基蓋凡胎十月降誕聖胎亦然十月火備功圓脫胎而化形爲純陽之體寒暑饑渴不能爲惱方可投於深山窮谷之中𢦙卑汚僻陋之所面壁九年以空其心無人無我心境一如故謂之神仙抱一也正釋子收牛之時惟識心見性者抱之則斯道弘矣九載功備無爲之性自圓而慧自生純陽之體自妙而神自靈故得性命與道合眞而無形矣無形之形隨物現相遇風則風遇雨則雨遇水火則爲水火遇飛走草木變化不測倏存倏亡瞻之在前忽焉在後故能分身百億應現無方若一月之炤萬水無不周徧是以隨緣赴感靡所不應原其至眞之軀處於至靜之域實未嘗有作者此乃神形性命與道合眞而同歸於究竟寂空之本源也故聖人强名之曰九轉金液大還丹也又曰金剛不壞之軀乃爲無上至眞之妙道也仙翁獨弘斯道故以眞金妙色之身證其巍巍堂堂眞金慈相普現法界救度眾生故示劉奉眞之徒以性道無生而入寂後現眞身於王屋山中示以命道不滅而圓通故於元豐五年三月初五日屍解之時乃留偈曰一靈妙用法界圓通此非性命之道雙圓形神之眞俱妙豈能與於此其閱世亦九十六載矣平時宏闡玄微吟詠情性言辭奧雅汲引後來自目其篇曰悟眞悟眞云者性命之眞也又恐後學惟知命道而不知盡性惟知性道而不知養命故有了悟眞如之一絕丹是色身妙寶之一詞啟發高明之士大根器之人俾知性命之道咸獲究竟圓通逈超三界此非無礙大悲平等之心智慧雙圓者孰能如是哉愚雖識見暗昧頗得仙翁之密旨故精研是編而漏其精機十已八九矣深慮同好之士不知金丹源流所自於是原始要終冒犯天譴直指悟眞之坦途倘有夙骨合仙者徑直入悟眞之門尋無爲於一黍之珠若於外覓則不可以冀其有所得矣昔元始天尊懸一寶珠大如黍米在空玄之中無鞅聖眾勃勃俱自珠口而入者卽此金丹之一粒也一粒如黍包含萬象囊括三才其大無外其小無內亘古迄今高眞上聖證此道者不可勝舉孰不由此一黍而證無上之大道者此道至簡至易苟非眞師指示則莫能曉其深根固蒂者根蒂識矣苟非鉅有財力者則亦莫能成其功而著其事也功事著矣苟非明心見性則亦莫能臻於抱一之妙也抱一旣妙則性命之道至矣不可復有以加矣是故命道莫不有傳於師指而後明修持而後著也若夫性道則不然不由外至者也苟徒見聞知識於外者則墮於中小之規而不徹其聽瑩之至者也惟於自已胸中自悟自明方能盡其性道而得所謂最上第一乘者也吁性道之中非有悟有明也悟無所悟明無所明而巳非有盡有得也盡無所盡得無所得而已最上第一也上無所上一無所一而已學者倘達師旨手握天機煅煉神丹脫胎換骨更能明心達本了悟眞空直超最上之乘徑入無爲之境則形神俱妙性命交圓駕鶴驂鸞乘龍跨鳳共爲蓬閬之遊必矣强兵戰勝之術夫强兵戰勝之術者乃煉金丹之旨也夫煉金丹者每以中秋初夜一陽動時坐鎭魁罡壇升三級左擒龍而審定鼎弦右捉虎而精調火候一文一武交爭戰於玄門一去一來互鬭危於牝戸息符刻漏數應周天無令毫髮差殊故曰强兵戰勝之術也夫兵者龍虎也戰者交媾也不一時辰立獲金丹入口戰勝之術著矣故西華經曰强兵戰勝在養玄珠之功也是以仙翁首列一十六首者以明龍虎各一八之數五言四韻一首者以表一時得金丹一粒也此余所以分爲上卷表而出之以明强兵戰勝之術則採金丹之功粲然明白矣富國安民之法夫富國安民之法者乃運陰陽符火之旨也夫人道無形肇生一炁一炁渾沌判爲陰陽故至陽之氣輕淸覆冒於上者謂之天至陰之氣重濁負載於下者謂之地積諸純陽之氣飛升於天者仙也積諸純陰之氣沈淪於地者鬼也稟一陰一陽之氣不升不淪之軀處於天地之中可仙可鬼者人也人能修煉剝盡羣陰而形化爲純陽之氣則升仙矣不知修煉日耗六陽而體化爲純陰之氣則爲下鬼矣易曰本乎天者親上本乎地者親下亦各從其類也是以聖人仰觀俯察知人稟天地之秀氣爲靈爲貴爲最故假眞陰眞陽之二物奪先天地之一炁以爲丹餌歸丹田氣海之中以御一身後天地生之氣則一身之氣翕然而歸之若萬邦之朝於君眾星之拱於北也如人因父母交感之精而有此身是以盜陰陽純粹之氣而爲化基號曰陰符陽火循環六十卦之中周而復始回七十二候二十四氣於一日一夜之中奪得四千三百六十年之正氣輻湊於丹田氣海之中温養丹珠其丹處於中宮無爲而靜應故得外接陰符陽火生眞一神軀十月脫胎而形化純陽眞一之氣饑渴不能撓寒暑不能侵故爲富國安民之法也夫國者身也民者精氣也民爲邦本本固邦甯邦若無君則民罔歸君若無臣則民罔治是以聖人以丹爲君以火爲臣丹火相須君臣慶會則天下平治精固民安故一身之國富矣西華經曰精完氣足所以國富民安正在餌金丹之後也是以仙翁續述絕句六十四首按周易六十四卦者明運火爻之計也又續成西江月一十二首以象運火沐浴共十有二月之功也此余所以分爲中卷以明運火之法富國安民之意葢修丹之序當如是爾神仙抱一之道夫神仙抱一之道者乃聖人運火功圓之時也形化純陽之氣者身投僻陋之隅面壁九年抱一以空其心心定神化與道冥一讚曰道爲性本性是心源心性同體變化無邊百姓日用亦曰自然若能了悟忘象忘言虛心實腹抱一而遷功成九轉乃得神仙此其旨也夫九轉者九年也九乃陽之極數也一者道之强名也抱者抱無所抱也神仙當此之時隳肢體黜聰明離凡聖齊物我毋固毋必無取無舍心境如一逍遙自在故得泰定發乎天光九載功圓則無爲之性自圓無形之神自妙神妙則變化無窮隱顯莫測性圓則慧炤十方靈通無礙故能分身百億應顯無方而其至眞之體處於至靜之域闃然而未嘗有作者此其神性形命俱與道合眞矣故謂之神仙抱一之道也昔仙翁道成之後示劉奉眞之徒以無生而入寂旣入寂矣而又現其身於王屋山中者卽斯道也昔如來湼槃後自湧金棺於空中化三昧火旣焚其身矣因母哭而不已又現金身於空中爲說半句偈者亦斯道也昔達摩面壁九年旣入滅矣又擕隻履西歸並化焚身巨燄形旣然矣而鐸聲猶晰撼於空中若此之輩流未易該舉倘非性命雙圓形神俱妙孰能如是是故仙翁畢其卷末而以禪宗性道者實明神仙抱一之道也故余分爲下卷原夫性之道虛無廣漠默默昏昏無可得而形容以言之也人與非人悉皆平等無有高下但以無始以來凡有形與名與夫無有形而名者未嘗有一物不圓成具足以其本然自有淸靜具足故未始有可得而形容以言之也然而大藏乃有五千四十八卷者此皆聖人以人昧道之甚不獲已而强言之也欲人因言以明道道明則言語俱成非矣故金剛經云如來有所說法卽爲謗佛是以有言皆是謗也今則仙翁歌詠性道亦不獲已而言之固已贅矣此余所以不復加解釋者不欲爲畫蛇添足也惟願猛烈高上之士不由外得直於自已胸中自悟自明卓然獨耀直下承當受用將去不問喧靜語默酒肆花衢恁麽也得不恁麽也得頭頭無別處處和諧盡十方世界具一隻眼出一隻手妙用縱橫四通八達葢天葢地隨處運動而莫非眞隨所施爲而無不可則知這裏本來天性具足無欠無餘擬議俱弛矣能所俱忘矣無問無應無思無慮雖性之一字抑亦用不著也
