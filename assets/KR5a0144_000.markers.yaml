藴無所藏矣然獲覽者得以尋詳釋其疑惑不伺咨聞能自了了所以成平叔先生之志也然而道源既欲以是垂世傳後則亦將緘默自此隱矣獲斯文者宜加祕密天之所寶在在處處自有神物營衛護持若有志士信道明眞言行無玷審是修行然後付焉金玉堆裏不可傳焉父子至親亦勿與之蓋輕泄慢漏身則受殃門户有灾子孫不祥豈止如是又將禍延九玄七祖陰譴冥責長役鬼官永不受生念兹慎兹無忽商丘老圃今是翁元王眞一既繕寫註解悟眞篇詩曲並與當時承受事蹟因編詳記於後雖言不文飾而直書實録庶幾備見本末云政和歲次乙未中秋日記泰定丁卯在瑞陽見薛紫賢註悟眞篇讀之惘然恨未見全本天曆癸巳歸昇獲全本反復讀之數年見其端倪繼蒙遠方道友寄至數本勘讎皆同註文所駁傍門或本作或者或本作葉文叔此其疑也近刊行悟眞篇解諸家節文其中所引象川翁無名子二人之註比之所獲紫賢之註又皆同疑其文同而人異此疑也宋嘉泰壬戌袁公輔斥文叔註疏混殽難考因選擇其註究公輔所受之道亦不過獨修一物又何斥他人哉文叔之果是哉何紫賢公輔皆斥之此其疑也因以年月考之道光作復命篇自叙宣和庚子歲得遇至人口訣今之商丘今是翁元王眞一在政和乙未記薛紫賢事蹟葉文叔註在紹興三十一年辛巳相隔四十七年文叔於政和乙未或未生或童幼安得紫賢於四十七年之前豫指名而斥之者又皆文叔之眞謬非他人所註此其疑也以是數疑疑其非紫賢之註而未决然其所註與諸家不同而實得眞人之㫖至順辛未五月初三日得遇金丹藥物火候直訣天授之也終疑其非紫賢所註於心未釋參問不已旁求四方至順壬申秋武陵故友傳至象川翁葆光解喜躍不已讀之累月則前之所疑涣然冰釋確然如世傳紫賢之註實爲無名子之註迷以葆光訛爲道光何其訛傳之乆而人未之訂耶何以言之眞人傳石杏林杏林傳紫賢爲第三傳此世之知也眞人傳廣益子廣益子傳無名子亦爲第三傳此世之罕知也好事者欲其所註取信當世遂節無名子之註以傳流之顯者知紫賢附於後以實之記者曰元王眞一安有元王之姓是自訛其記述之名以惑世也或者又曰紫賢爲僧一名道光一名葆光是又以光宇之同而訛以二人爲一人也其指斥葉文叔者今以無名子之註考之前乎文叔未有註悟眞篇者後乎文叔未有斥文叔之非者無名子恐其失眞人之㫖迷誤後人於乾道癸巳冒犯天譴謹依師㫖註解篇義毫分縷析惟恐人迷可謂仁慈之普盡泄天機者矣世人節録諸解未見全文又訛翁姓爲老者之稱分象川翁無名子爲二人近又訛無名子之註爲紫賢之註訛以傳訛於其文義年月尚不能參考其妄安望其知仙道之眞傳也哉金丹大道之的傳乆矣其絶矣今四海混一學仙紛紛求其一二能聞是道者何其寥寥也抑紫賢此註不傳於後世乎將予孤寡而未見乎今無名子之註詳盡而無留藴世傳紫賢之註大同而多闕略假使紫賢有註無名子安得不援其文而反竊其全文而易以己名而傳世乎無名子於釋月圓之義止引紫賢二語可見紫賢之未有註也今訛爲紫賢之註者於始於有作人事覺之註及引無是子曰無是即無名之訛也可見紫賢之未嘗有註也今之學仙者未可以紫賢顯知無名罕知以重爲輕也然其師傳之眞仙道之正二仙皆同也皆傳之自平叔眞人斯文所在端有神物營衛護持安得不寶其文而珍藏之擇其人而流傳之因並附所記眞人本末及紫賢事迹於無名子註文之後而通辨之庶得斯註疏者理易明訛易革知吾言之不妄不敢訛傳其註也知大道之難聞不敢輕傳非人也學仙有縁因文解義因註達㫖不迷傍門直超大道天之所賜則金丹大道未嘗絶傳矣世之又傳别本有淳熙改元九月子虚子小序在陳紫陽序之前其於無名子之序節去謹依仙翁之祕㫖一段又易其後文分三乘祕要論名貫卷首其於註文增又曰其說之要以童男童女爲陰陽龍虎男女之氣爲先天後天爲鉛汞爲眞水火爲初弦當天癸之年爲癸生二八爲三陽備爲蟾光圓爲金鼎完爲大小無傷爲兩國全爲先天氣爲外藥誠可謂邪宗曲派而妄註之也乃子虚子之邪宗故不敢顯姓名又冒先書其年月託以無名子未言㫖取於世或曰子虚子即無名子之異號曰審如是則無名子自相矛盾矣且乾道癸巳次年甲午改元淳熙一年之間師㫖遽異何以言之嘉泰甲子白雲子序陳紫陽始傳斯註相詎三十二年註文全然純一祕㫖坦然明白無一宇邪說以揉雜之癸巳至甲午相詎期月即畔前註當是時無名子未仙去倘見聞之必以爲邪宗而攻之矣豈有攻葉文叔而守子虚子者乎且子虚子何不就有道以正使其傳果正邪無名子必自增改又何以爲增無名子未言之㫖乎是以知其妄註也審矣學仙之士有縁獲斯註之眞者幸明鑑而珍襲之至元丙子中元空玄子戴起宗仲同父謹辨我聞在昔有若紫賢眞人闡大道之希微拯迷徒之淪溺道成之日著悟眞篇以傳于世蓋平生之所歷萃於此矣學道者不率是篇之所言譬猶適江海而離楫也奈何世遠風微言厖道隱堅執傍門以毁仙道深蔽法象以非眞詮由此以神仙爲渺茫丹書爲漫誕而悟眞之書眞人之心竟莫克明于世乃若無名子接夫正傳之緒念其註者訛以傳訛復以此書註行于世章分句釋畦疏町别盡泄天機備載其中熟玩精思當自得也叔祖父自稚齡慕道讀之有年天啓其衷與聞玄祕以平日所聞於父師所授者與夫己之所自得者疏於無名子註文之末俾來者得以取準焉不至墮於渺茫而流于誕漫也溥哉其心乎順夙生有縁獲闚其書寔爲慶幸又安得友方外之人踏名巘以棲眞策仙風而遐詣安立鼎爐呼吸龍虎顛倒汞鉛採之於一時胎之於十月空之於九載泠然馭飛車度弱水跨靈鰲侍諸仙眞之下風以聞希夷之大道以拯淪溺之徒乃所願則學紫賢也至元丁丑上巳日後學戴順稽首書于朱湖大生洞天金丹法象無名子於悟眞篇註攢集金丹法象比喻衆名可謂備矣起宗推廣裒集參同契及諸仙經論詩詞凡所假借天道易象人事理物比喻金丹陰陽法象分爲七類附於悟眞篇註之下庶學仙者易於參究知夫内外同異之分互爲法象五行變化之序難以定名明其本源之一契其同有之實辨其異喻之名則仙師之明皆可以一貫之得於此而忘眞筌由於此而成仙道亦非小補云至元丁丑上元戴起宗序陽天日參乾離父夫君主婦性氣神冠魂目火南甲午丙二七心花玉龍蛇雄牡虚氣上轂物器矩要汞輕浮精字戊大動表兔剛赤呼無竒德禮喜賞男晝暑天魂乾象日魂張翼房六上弦乾馬震龍扶桑崑崙姹女長男木婿戊土二南地二朱砂曾青青龍火龍海龍赤鳳乾爐玉鼎玉池下德恍惚眞砂朱雀丹陽朱砂鼎生於甲乙陰地月商坤坎母婦臣賔夫情精命昏魄耳水北庚子壬一六腎酒金虎龜雌牝實液下軸藥鼎規流鉛重沉光鳴巳小靜裏烏柔黑吸有耦刑智怒罰女夜寒地魄坤象月魄虚危昴七下弦坤牛坎虎華嶽曲江嬰兒少女金妻己土一北天一黑鉛山澤白虎水虎嶽虎黑龜坤鼎金爐西川上德杳冥眞汞玄武眞陰偃月爐生於庚辛陽中陰震離妻臣賓卯甲東情仁左三八浮肝木女物父日魂烏髓姹女人民賓客青娥離女眞汞木液火汞黄芽玉液神水火龍牝龍金烏眞龍眞陰雌母雌陰陰火陽氣流珠女青雌火紅鉛朱砂交梨東二玉芝丹基眞火午北龍西水銀天玄女日中烏母之血龍弦氣龍呼虎陰白火火中水紅入黑赤鳳髓流汞父紅鉛精砂裏汞離之己坤之中女離中一陰山頭月白太陽流珠離己日光青衣女子碧眼胡兒女混男形砂中眞汞氣中取水雄裏藏雌烏肝八兩砂中生汞生於丙丁氣中生液二八姹女杳冥之精恍惚中物朱砂鼎内水銀下弦水半斤汞爲砂中水陰中陽兊坎夫君主酉庚西性義右四九沉肺金男藥母月魄兔脂金翁父母主人老郎坎男眞鉛金精水金白雪金液華池水虎雄虎玉兔眞虎眞陽雄父雄陽陽水陰精金華男白雄金黑鉛水銀火棗西四刀圭丹母眞水子南虎東玉蕊地黄男月中兔父之精虎弦氣虎吸龍黄芽鉛水中火黑入紅黑龜精黄金母黑鉛髓水中銀坎之戊乾之中男坎中一陽潭底日紅北方河車坎戊月精素練郎君白頭老子男兼女體鉛中眞銀水中取氣黑中有白兔髓半斤鉛内産砂生於壬癸液中生氣九三郎君恍惚之物杳冥中精偃月爐中玉蕊上弦金半斤金爲水中砂中宫土中五十信意脾祖眞土土德土釜元神神寶玄關玄門眞鉛金母金妃金胎金鼎鉛鼎汞鼎崑崙大冶乾宫坤位華池神胎神廬母舍戊己靈根聖胎靈户太淵規中辰極混沌丹房氣府關元丹田絳宫黄庭黄婆黄道元中玄竅藥母丹基冰壺函三星官母胎北海空玄黄家歸根竅復命關偃月爐懸胎鼎玄牝門戊己門造化爐造化機交感穴太乙爐神氣穴守一壇中黄官丹元府丹樞紐黄金母希夷府衆妙門太微官混沌門生殺舍黄帝土德黄中通理后土神鼎先天地生混沌金鼎黑白相符既濟鼎器法象天地皇上地德先天金胎神水華池類如雞子呼吸之根玄牝之門天地之根凝結之所皇石父母造化全窟外藥陽君金母虎鐵主鉛親君德金爲眞鉛陰火金精麻姑陽丹眞土眞一眞水神水大丹大藥金丹七返九還秋石金華嬰兒眞人谷神刀圭大定子珠甘露黄芽玄珠玄霜黍珠聖胎玉蕊金砂黄礐黄池外丹陽精水虎先天氣眞種子眞玄牝三五一摩泥珠中央土眞父母眞陰陽天五賊紫金霜玉壺冰絳雪丹眞一精第一鼎皇酥長生藥白馬牙天地髓坎離精眞一水水中金水裏鉛眞主人九轉丹天生芽自然體乾坤精天地氣陰里陽精先天地精赫赫金精天地靈根陰陽聖母乾坤鼎器坎離藥物神符白雪壺中日月龍池大丹宇寅之主雪山醍醐坎位中心實聖父靈母之氣混元眞一陽天地陰陽長生眞精天地混沌之根太乙含眞氣坤位生成體内藥陰臣木子龍磁賔汞踈家臣兔兒眞汞陽火木液張騫陰汞眞火雪胎嬰兒内丹陰丹玄珠火龍後天氣己汞火天地子氣陽裏陰精元陽之氣金液還丹陰中陽火離官腹内金液大還東陽造化爐靈胎中神室靈胎中鉛汞紫陽眞人悟眞直指詳說三乘秘要, YP-C: ''}
