  - {type: variant, offset: 3816, length: 5470, content: 三乘祕要詩金丹術大哉一黍兆虚無降本流形復卦初兩片乾坤資造化一觔日月運機樞周星息數微微數進火神功的的符燒罷半辰文武火赤龍奪得夜明珠運火法一珠餌罷地交天兩腠玄關火熾然六十卦循朝與暮九重城裏汞燒鉛抽添運用須防險沐浴停符不使烟功備脱胎完十月无中養出大羅仙抱一法丹即筌蹄道即魚忘筌得道證空虚莫堅守抱無爲一撲碎虚空一也無妙有靈光常赫赫含容法界自如如隨縁赴感常清淨九載金剛不壞軀夫泛景大霞飛昇金闕言存蕋簡事出塵寰彼世俗之人不能深信嘗觀總仙集序以爲自昔冲舉者十萬餘人拔宅者八千餘家劉向在漢爲漢儒宗亦作列仙傳以貽後世則知神仙非誕明矣然世俗所以不信者無他天機玄奥仙聖祕密習薄人浮誠不接於耳無怪其不信也昔太上說常清靜經首言大道無形生育天地大道無情運行日月以至長養萬物陶鑄群生亦歸於混元无名之始先聖之原人者至矣繼而申之以天地男女清濁動靜之理詳及於清心寡欲湛然常寂之妙無非顯示天機密示玄㫖也殆其終篇爲能以悟之者可傳聖道究極之說得於仙人葛公之語則口口相傳不記文宇嗟夫淳風一離習俗淺薄仙塵杳隔此道無傳異說雖多同歸渺藐因是採取鉛之法不形於竹帛之間結胎育嬰之妙深鎖於金匱玉函之中學仙之子皓首窮年終無由得其髣彿聖宋龍興異人間出紫玄眞人張公少遊辟雍夙禀靈骨立志精勤艱辛不替得道於青城丈人盡得金丹奥㫖罄其所遇發爲歌詠自名其書曰悟眞篇愚幼而讀之潛心深思徧參衆說無所發明或指爲丹竈之術或訛爲内御之說撫篇浩歎積年于兹有幸自天得遇紫陽仙翁陳公親傳悟眞適孫無名眞人釋義密以見授焚盥莊誦恍然如霧散雲收日明月朗口訣心要未敢叩擊已知生天生地之機運行日月之道與夫長養萬物陶鑄群生不出於眞陰眞陽上下二弦之氣至於運用抽添防危慮險燦燦然在目睫間倘能遭遇眞傳得兹妙道生育胎仙超凡入聖諒不虚度此生甫得入手踴躍欣慶敬依泓穎題諸卷末時聖宋嘉泰甲子中秋白雲子謹叙悟眞篇本末事蹟張眞人本末紫陽眞人乃天台纓絡街人先名伯端字平叔後名用成少無名不學浪迹雲水晚傳混元之道未備孜孜訪問徧歷四方熙寧中陸公龍圖鋭鎮成都乃依以遊蜀任四川節度制置使安撫司參議於己酉歲遂遇異人傳火候之祕其道乃成仍戒之曰他日有與汝脱韁鎖者當受之既而三傳每罹灾患仍深自悔責遁世忘言著悟眞篇八十一章盡述二丹之祕其議論大㫖則深嫉世之學者專門各宗三教異流不能混一矣異派同源之理通亮繼正力補於道天下傳誦之陸公其蜕得其舍利千百若雞頭實者色皆紺碧既而復有見之者云政和中通姓名以謁黄君冕仲尚書於延平黄公素傳容成之道且酷嗜爐火年加耄矣語不契而去繼而使人寓書於黄叙述甚異其孫銓見其書祕不盡言獨告予大略云平叔自謂與黄皆紫微天官號九皇眞人因校劫運之籍遂謫於人間今垣中可見者六星而已潛耀者三平叔冕仲洎維揚于先生也平叔曰紫陽眞人冕仲曰紫元眞人于公曰紫華眞人一時被譴者官吏皆已復於清都矣今平叔又登仙品獨冕沉淪於宦海凡當爲人者十世今九世矣來世苟復迷妄合塵則淪墜異趣無復升遷之期平叔明序仙契力欲振拔而黄公竟不契而没惟自號曰紫元翁而已九皇不載於天官蓋微星也非常名而可名者在萬二千五百之間耶薛紫賢事蹟道源姓薛名式陜府雞足山人也嘗爲僧法號紫賢雲遊長安留開福寺參長老修嚴嚴與道眼因縁金雞未鳴如何後這音響又參僧如環如何是超佛祖之啖糊餅圓陀陀地聞桔橰頓有省悟有頌曰軋軋相從響發時不從他得豁然知桔橰說得無生曲井底沉蛇舞柘枝二老然之自爾頓悟無上祕密圓明眞實法要機鋒迅速宗說兼通且復雅志金丹道養崇寧丙戌歲冬寓郿縣青鎮聽講佛事適遇鳳翔府扶風縣杏林驛人石泰宇得之年八十五矣緑髮朱顔神宇不凡夜事縫紉道源密察焉心因異之偶舉張平叔詩曲石攫然曰識斯人乎曰吾師也遂將語着於平叔者平叔先生舊名伯端始於成都宿天回寺遇異人改名用成鳳州太守怒按以事坐黥竄經由邠境會天大雪與護送者俱飲酒村肆吾適肆中既揖而坐見邀同席吾笑顧此衆客方懽彼客未成飲盍來相就於是會飲酒酣問其故且以告吾念之曰邠守故人也樂善忘勢不遠百里能迂玉趾有因縁可免此行平叔懇諸護送者許之諾遂復丁邠吾爲之先一見獲免平叔德之曰此恩不報豈人也哉子平生學道無所得聞今將丹法用傳于子以成道吾再拜謝仰受付囑道源源聞石泰說是語已稽首皈依請因受業卒學大丹及復受得口訣眞要且戒往通邑大都依有德有力者可即圖之道源遂來京師棄僧伽梨幅巾縫掖和光同塵混於常俗覬了此事豈患學仙道流得遇平叔詩曲隨其所見致有差殊而意之所疑又須展轉心生迷謬莫能曉悟孰從而語之參同哉致使不敢下手修鍊者多矣嗚呼豈平叔先生之本心哉於是慨然首爲訓釋條達宗㫖通玄究微開蒙發昧人可率解俾修鍊者無或差誤得證高眞作丹砂用初平叔先生嘗因獲罪誓不語人已而歎曰自爲計得矣非所以爲道也太上玄科曰遇人不傳失天道妄傳非人泄天寶傳得其人身有功妄傳七祖受冥考我今靳固閉天道也禍將大矣不得已述詩曲始以流傳世之奇人使讀之自悟詩曲中之意亦隱深不可識道源因以推廣其意爲註解明白眞要洞闡玄微法事悉備表裏焕然餘藴無所藏矣然獲覽者得以尋詳釋其疑惑不伺咨聞能自了了所以成平叔先生之志也然而道源既欲以是垂世傳後則亦將緘默自此隱矣獲斯文者宜加祕密天之所寶在在處處自有神物營衛護持若有志士信道明眞言行無玷審是修行然後付焉金玉堆裏不可傳焉父子至親亦勿與之蓋輕泄慢漏身則受殃門户有灾子孫不祥豈止如是又將禍延九玄七祖陰譴冥責長役鬼官永不受生念兹慎兹無忽商丘老圃今是翁元王眞一既繕寫註解悟眞篇詩曲並與當時承受事蹟因編詳記於後雖言不文飾而直書實録庶幾備見本末云政和歲次乙未中秋日記泰定丁卯在瑞陽見薛紫賢註悟眞篇讀之惘然恨未見全本天曆癸巳歸昇獲全本反復讀之數年見其端倪繼蒙遠方道友寄至數本勘讎皆同註文所駁傍門或本作或者或本作葉文叔此其疑也近刊行悟眞篇解諸家節文其中所引象川翁無名子二人之註比之所獲紫賢之註又皆同疑其文同而人異此疑也宋嘉泰壬戌袁公輔斥文叔註疏混殽難考因選擇其註究公輔所受之道亦不過獨修一物又何斥他人哉文叔之果是哉何紫賢公輔皆斥之此其疑也因以年月考之道光作復命篇自叙宣和庚子歲得遇至人口訣今之商丘今是翁元王眞一在政和乙未記薛紫賢事蹟葉文叔註在紹興三十一年辛巳相隔四十七年文叔於政和乙未或未生或童幼安得紫賢於四十七年之前豫指名而斥之者又皆文叔之眞謬非他人所註此其疑也以是數疑疑其非紫賢之註而未决然其所註與諸家不同而實得眞人之㫖至順辛未五月初三日得遇金丹藥物火候直訣天授之也終疑其非紫賢所註於心未釋參問不已旁求四方至順壬申秋武陵故友傳至象川翁葆光解喜躍不已讀之累月則前之所疑涣然冰釋確然如世傳紫賢之註實爲無名子之註迷以葆光訛爲道光何其訛傳之乆而人未之訂耶何以言之眞人傳石杏林杏林傳紫賢爲第三傳此世之知也眞人傳廣益子廣益子傳無名子亦爲第三傳此世之罕知也好事者欲其所註取信當世遂節無名子之註以傳流之顯者知紫賢附於後以實之記者曰元王眞一安有元王之姓是自訛其記述之名以惑世也或者又曰紫賢爲僧一名道光一名葆光是又以光宇之同而訛以二人爲一人也其指斥葉文叔者今以無名子之註考之前乎文叔未有註悟眞篇者後乎文叔未有斥文叔之非者無名子恐其失眞人之㫖迷誤後人於乾道癸巳冒犯天譴謹依師㫖註解篇義毫分縷析惟恐人迷可謂仁慈之普盡泄天機者矣世人節録諸解未見全文又訛翁姓爲老者之稱分象川翁無名子爲二人近又訛無名子之註爲紫賢之註訛以傳訛於其文義年月尚不能參考其妄安望其知仙道之眞傳也哉金丹大道之的傳乆矣其絶矣今四海混一學仙紛紛求其一二能聞是道者何其寥寥也抑紫賢此註不傳於後世乎將予孤寡而未見乎今無名子之註詳盡而無留藴世傳紫賢之註大同而多闕略假使紫賢有註無名子安得不援其文而反竊其全文而易以己名而傳世乎無名子於釋月圓之義止引紫賢二語可見紫賢之未有註也今訛爲紫賢之註者於始於有作人事覺之註及引無是子曰無是即無名之訛也可見紫賢之未嘗有註也今之學仙者未可以紫賢顯知無名罕知以重爲輕也然其師傳之眞仙道之正二仙皆同也皆傳之自平叔眞人斯文所在端有神物營衛護持安得不寶其文而珍藏之擇其人而流傳之因並附所記眞人本末及紫賢事迹於無名子註文之後而通辨之庶得斯註疏者理易明訛易革知吾言之不妄不敢訛傳其註也知大道之難聞不敢輕傳非人也學仙有縁因文解義因註達㫖不迷傍門直超大道天之所賜則金丹大道未嘗絶傳矣世之又傳别本有淳熙改元九月子虚子小序在陳紫陽序之前其於無名子之序節去謹依仙翁之祕㫖一段又易其後文分三乘祕要論名貫卷首其於註文增又曰其說之要以童男童女爲陰陽龍虎男女之氣爲先天後天爲鉛汞爲眞水火爲初弦當天癸之年爲癸生二八爲三陽備爲蟾光圓爲金鼎完爲大小無傷爲兩國全爲先天氣爲外藥誠可謂邪宗曲派而妄註之也乃子虚子之邪宗故不敢顯姓名又冒先書其年月託以無名子未言㫖取於世或曰子虚子即無名子之異號曰審如是則無名子自相矛盾矣且乾道癸巳次年甲午改元淳熙一年之間師㫖遽異何以言之嘉泰甲子白雲子序陳紫陽始傳斯註相詎三十二年註文全然純一祕㫖坦然明白無一宇邪說以揉雜之癸巳至甲午相詎期月即畔前註當是時無名子未仙去倘見聞之必以爲邪宗而攻之矣豈有攻葉文叔而守子虚子者乎且子虚子何不就有道以正使其傳果正邪無名子必自增改又何以爲增無名子未言之㫖乎是以知其妄註也審矣學仙之士有縁獲斯註之眞者幸明鑑而珍襲之至元丙子中元空玄子戴起宗仲同父謹辨我聞在昔有若紫賢眞人闡大道之希微拯迷徒之淪溺道成之日著悟眞篇以傳于世蓋平生之所歷萃於此矣學道者不率是篇之所言譬猶適江海而離楫也奈何世遠風微言厖道隱堅執傍門以毁仙道深蔽法象以非眞詮由此以神仙爲渺茫丹書爲漫誕而悟眞之書眞人之心竟莫克明于世乃若無名子接夫正傳之緒念其註者訛以傳訛復以此書註行于世章分句釋畦疏町别盡泄天機備載其中熟玩精思當自得也叔祖父自稚齡慕道讀之有年天啓其衷與聞玄祕以平日所聞於父師所授者與夫己之所自得者疏於無名子註文之末俾來者得以取準焉不至墮於渺茫而流于誕漫也溥哉其心乎順夙生有縁獲闚其書寔爲慶幸又安得友方外之人踏名巘以棲眞策仙風而遐詣安立鼎爐呼吸龍虎顛倒汞鉛採之於一時