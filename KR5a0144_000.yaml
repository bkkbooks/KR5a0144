front:
  text: 紫陽眞人悟眞直指詳說三乘秘要律六
  hash: sha256:dea45da5d8820e6783c713b4d8175839a21e60c96a436eaa43810cd559d2ec90
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0144_HFL_000-001a, image: hfl/0064/0064-118.png}
body:
  text: 象川無名子翁葆光迷悟眞直指詳說夫混沌未顯之前虚無寂寞無名可宗强名曰道道降而生一氣非動非靜非濁非清邈不可測聖人强言謂之混元眞一之氣一氣既判化爲陰陽陰陽者天地也男女者也天地絪緼萬物化醇男女媾精萬物化生故自有天地以來未有一物不因陰陽相交而得其形者夫欲修鍊者若以金石草木之象名萬有不同之器類以至一身精神氣血液之屬而爲丹質者此皆後天地生滓質之物也滓質之物有形可睹安能生有形而入於無形也哉後天地生者也皆不離乎天地之内而有形者未嘗不壞安能變化而超乎天地之外也哉不超乎天地之外而有形者未始不墮於陰陽生死之數者也夫陽主生陰主死一死一生一往一復此理之自然也設使煅鍊得法服餌有功壽等龜齡年齊鶴筭及其數盡未有不亡若箭之射空力盡必墜謂其有形未有不壞之理也是故聖人採先天一氣爲丹鍊形還歸於一氣鍊氣歸神鍊神合道而歸於無形之形故能超乎天地之外立乎造化之表掌握陰陽挈提天地陰陽生死之所變者九天一氣使之然也故得丹體常靈常存不生不滅矣譬猶運瓮處瓮之内焉能運瓮必也處瓮之外則能運瓮矣眞一之氣生於天地之先邈不可測聖人以同類之物誘之成丹亦猶日中有火以陽燧引之則得其火矣又如月中有水以方諸引之則得其水矣故煅同類之物立爲爐鼎號曰眞龍眞虎故吕公詞有自然爐鼎虎繞與龍蟠之語也夫同類者無情之情不色之色也萬物之中得其性命之正爲靈爲貴之最者也假如初弦之氣也運而用之故號曰眞鉛眞汞也仙翁曰時人要識眞鉛汞不是凡砂及水銀乃初弦鉛之氣也初弦者上下弦二八之數也龍稱八雨虎重半斤所以謂之二八也此時水源至清有氣而無質者也以此氣類而誘之則眞一之氣降靈而有象也仙翁曰藥逢氣類方成象道在虚無合自然也夫鍊此金丹先求名山福地次創丹室數椽壇築三層劍卓四面懸之以鏡方乃立龍虎爲鼎爐置刻漏爲規矩抽添有水火之則作用有輔弼之儔如此之類未易敷陳亦假世財方克就緒故陰眞君論曰欲修此道須假資財如無資財則修金丹不成又須三人爲侣方可修鍊三人同心一志之良友也密當八月首望之宵一陽初動之際當先主者禹步登壇左手擒龍右手擒虎精調氣候數按周星一作天正配陰陽息符刻漏故得金水交併龍木孕英矣一者坐幄運籌經文緯武而繼其中間首尾之所施不使毫釐差惑故仙翁曰大都全藉修持力髦髮差殊不作丹也一者潜窺刻漏之的密整抽添之用準備火工無失復卦逾時過刻丹必難成故朝元子曰勸君窮取周天數莫使差跎復卦催三人一心遞互相符不半時辰立得眞一之氣歸于交感之宫結成一粒大如黍珠號曰金丹現在北海之中赫然光透簾幃即時密運鏌鎁以追之纔得入口則立躋聖位矣故仙翁曰一粒金丹吞入腹方知我命不由天得此一粒鎮在丹田氣海之中則一身精氣翕然而歸之立結成砂而不失走然後運火煅鍊成金液還丹夫火者陰陽之氣也陽數奇陰數偶自子至巳六辰屬陽故謂之陽火自午至亥六辰屬陰故謂之陰符乾之策二百一十有六坤之策一百四十有四二篇之中奪得四千三百二十年正氣歸我丹田之中温養子珠結就聖胎也老君曰陽奇自子生陰偶從午發終始在乾坤中冥母胎月故得外精陰陽之火内生金液之質不假施功自然運轉從尾閭歷歷然有聲直透雙關逆上泥丸峰頂降下口中狀如雀卵馨香甘美此乃金液還丹也徐徐咽下丹田結成聖胎養就嬰兒故仙翁曰嬰兒是一含眞氣十月胎圓入聖基蓋凡胎十月降誕聖胎亦然十月火備功圓脱胎而化形爲純陽之體寒暑飢渴不能爲惱方可换於深山窮谷之中或卑污僻陋之所面壁九年以空其心無人無我心境一如故謂之神仙抱一也正釋子收牛之時惟識心見性者抱之則斯道弘矣九載功備無爲之性自圓而慧自生純陽之體自妙而神自靈故得性命與道合眞而無形矣無形之形隨物現相遇風則風遇雨則雨遇水火則爲水火遇飛走草木變化不測倏存倏亡瞻之在前忽焉在後故能分身百億應現無方若一月之照萬水無不週遍是以隨縁赴感靡所不應原其至眞之軀處於至靜之城實未嘗有作者此乃神形性命與道合眞而同歸於究竟寂空之本源也故聖人强名之曰九轉金液大還丹也又曰金剛不壞之軀乃爲無上至眞之妙道也仙翁獨弘斯道故以眞金妙色之身證其巍巍堂堂眞金慈相普現法界救度衆生故示劉奉眞之徒以性道無生而入寂後現眞身於王屋山中示二命道不滅而圓通故於元豐五年三月初五日屍解之時乃留偈曰一靈妙用法界圓通此非性命之道雙圓形神之眞俱妙豈能與於此其閲世亦九十六載矣平時宏闡玄微吟詠情性言辭奥雅汲引後來自目其篇曰悟眞悟眞云者性命之眞也又恐後學惟知命道而不知盡性惟知性道而不知養命故有了悟眞如之一絶丹是色身妙寶之一詞啓發高明之士大根器之人俾知性命之道咸獲究竟圓通迥超三界此非無碍大悲平等之心智慧智圓者孰能如是哉愚雖識見暗昧頗得仙翁之密㫖故精研是篇而漏其精機十已八九矣深慮同好之士金丹源流所自於是原始要終冒犯天譴直指悟眞之坦途倘有夙骨合仙者徑直入悟眞之門尋無爲於一黍之珠若於外覓則不可以冀其有所得矣昔元始天尊懸一寶珠大如黍米在空玄之中無鞅聖衆勃勃俱自珠口而入者即此金丹之一粒也一粒如黍包含萬象囊括三才其大無外其小無内亘古迄今高眞上聖證此道者不可勝舉孰不由此一黍而證無上之大道者此道至簡至易苟非眞師指示則莫能曉其深根固蒂者根蒂識矣苟非鉅有財力者則亦莫能成其功而著其事也功事著矣苟非明心見性則亦莫能臻於抱一之妙也抱一既妙則性命之道至矣不可復有以加矣是故命道莫不有傳於師指而後明修持而後著也若夫性道則不然不由外至者也苟非見聞知識於外者則墮於中小之規而不徹其聽瑩之至者也惟於自己胸中自悟自明方能盡其性道而得所謂最上第一乘者也吁性道之中非有悟有明也悟無所悟明無所明而已非有盡有得也盡無所盡得無所得而已最上第一也上無所上一無所一而已學者倘達師㫖手握天機煅鍊神丹脱胎换骨更無明心達本了悟眞空直超最上之乘徑入無爲之境則形神俱妙性命交圓駕鶴驂鸞乘龍跨鳳共爲蓬閬之遊必矣强兵戰勝之術夫强兵戰勝之術者乃鍊金丹之㫖也夫鍊金丹者每以中秋初夜一陽動時坐鎮魁罡壇升三級左擒龍而審定鼎弦右捉虎而精調火候一文一武交爭戰於玄門一去一來互鬥危於牝户息符刻漏數應周天無令毫髮差殊故曰强兵戰勝之術也夫兵者龍虎也戰者交媾也不一時辰立獲金丹入口戰勝之術著矣故西華經曰强兵戰勝在養玄珠之功也是以仙翁首列一十六首者以明龍虎各一八之數五言四韻一首者以表一時得金丹一粒也此余所以分爲上卷表而出之以明强兵戰勝之術則採金丹之功粲然明白矣富國安民之法夫富國安民之法者乃運陰陽符火之㫖也夫人道無形肇生一氣一氣混沌判爲陰陽故至陽之氣輕清覆冒於上者謂之天至陰之氣重濁負載於下者謂之地積諸純陽之氣飛升於天者仙也積諸純陰之氣沉淪於地者鬼也禀一陰一陽之氣不昇淪之軀處於天地之中可仙可鬼者人也人能修鍊剥盡羣陰而形化爲純陽之氣則昇仙矣不知修鍊日耗六陽而體化爲純陰之氣則爲下鬼矣易曰本乎天者親上本乎地者親下亦各從其類也是以聖人仰觀俯察知人禀天地之秀氣爲靈爲貴爲最故假眞陰眞陽之二物奪先天地之一氣以爲丹餌歸丹田氣海之中以御一身後天地生之氣則一身之氣翕然而歸之若萬邦之朝於君衆星之拱北也如人因父母交感之精而有此身是以盗陰陽純粹之氣而爲化基號曰陰符陽火循環六十卦之中周而復始回七十二候二十四氣於一日一夜之中奪得四千三百六十之正氣輻凑於丹田氣海之中温養丹珠其丹處於中官无爲而靜應故得外接陰符陽火生眞一神軀十月脱胎而形化純陽眞一之氣飢渴不能撓寒暑不能侵故爲富國安民之法也夫國者身也民者精氣也民爲邦本本固邦寧邦若無君則民罔歸君若無臣則民罔治是以聖人以丹爲君以火爲臣丹火相須君臣慶會則天下平治精固民安故一身之國富矣西華經曰精完氣足所以富國民安正在餌金丹之後也是以仙翁續述絶句六十四首按周易六十四卦者明運火爻之計也又續成西江月一十二首以象運火沐浴共十有二月之功也此余所以分爲中卷以明運火之法富國安民之意蓋修丹之序當如是爾神仙抱之道夫神仙抱一之道者乃聖人運火功圓之時也形化純陽之氣者身投僻陋之隅面壁九年抱一以空其心心定神化與道冥一讚曰道爲性命本性是心源心性同體變化無邊百姓日用亦曰自然若能了悟忘象忘言虚心實腹抱一而遷功成九轉乃得神仙此其㫖也夫九轉者九年也九乃陽之極數也一者道之强名也抱者抱無所抱也神仙當此之時隳肢體黜聰明離凡聖齊物我毋固毋必無取無捨心鏡如一逍遥自在故得泰定發乎天光九載功圓則無爲之性自圓無形之神自妙神妙則變化無窮隱顯莫測性圓則慧照十方靈通無破故能分身百億應顯兄方而其至眞之體處於至靜之域闃然而未嘗有作者此其神性形命俱與道合眞矣故謂之神仙抱一之道也昔仙翁道成之後示劉奉眞之徒以無生而入寂既入寂矣而又現其身於王屋山中者即斯道也昔如來涅槃後自湧金棺於空中化三昧火既焚其身矣因母哭而不已又現金身空中爲說半句偈者亦斯道也昔達磨面壁九年既入滅矣又携隻履西歸並化焚身巨焰形既然矣而鐸聲猶撼於空中若此之輩流未易該舉倘性命雙圓形神俱妙孰能如是是故仙翁畢其卷末而以禪宗性道者實明神仙抱一之道也故余分爲下卷原夫性之道虚無廣漠默默昏昏無可得而形容以言之也人與非人悉皆平等無有高下但以無始以來凡有形與名與夫無有形而名者未嘗有一物不圓成具足以其本然自有清靜具足故未始有可得而形容以言之也然而大藏乃有五千四十八卷者此皆聖人以人味道之甚不獲己而强言之也欲人因言以明道道明則言語俱成非矣故金剛經云如來有所說法即爲謗佛是以有言皆是謗也今則仙翁歌詠性道亦不獲己而言之固已贅矣此余所以不復加之解釋者不欲爲畫蛇添足也惟願猛烈高上之士不由外得直於自己胸中自悟自明卓然獨耀直下承當受用將去不問喧靜語默酒肆花衢恁麽也得不恁麽也得頭頭無别處處和諧盡十方世界具一隻眼出一隻手妙用縱横四通八達蓋天蓋地隨處運動而莫非眞隨所施爲而無不可則知這裏本來天性具足無欠無餘擬議俱弛矣能所俱忘矣無問無應無思無慮雖性之一字抑亦用不着也三乘祕要詩金丹術大哉一黍兆虚無降本流形復卦初兩片乾坤資造化一觔日月運機樞周星息數微微數進火神功的的符燒罷半辰文武火赤龍奪得夜明珠運火法一珠餌罷地交天兩腠玄關火熾然六十卦循朝與暮九重城裏汞燒鉛抽添運用須防險沐浴停符不使烟功備脱胎完十月无中養出大羅仙抱一法丹即筌蹄道即魚忘筌得道證空虚莫堅守抱無爲一撲碎虚空一也無妙有靈光常赫赫含容法界自如如隨縁赴感常清淨九載金剛不壞軀夫泛景大霞飛昇金闕言存蕋簡事出塵寰彼世俗之人不能深信嘗觀總仙集序以爲自昔冲舉者十萬餘人拔宅者八千餘家劉向在漢爲漢儒宗亦作列仙傳以貽後世則知神仙非誕明矣然世俗所以不信者無他天機玄奥仙聖祕密習薄人浮誠不接於耳無怪其不信也昔太上說常清靜經首言大道無形生育天地大道無情運行日月以至長養萬物陶鑄群生亦歸於混元无名之始先聖之原人者至矣繼而申之以天地男女清濁動靜之理詳及於清心寡欲湛然常寂之妙無非顯示天機密示玄㫖也殆其終篇爲能以悟之者可傳聖道究極之說得於仙人葛公之語則口口相傳不記文宇嗟夫淳風一離習俗淺薄仙塵杳隔此道無傳異說雖多同歸渺藐因是採取鉛之法不形於竹帛之間結胎育嬰之妙深鎖於金匱玉函之中學仙之子皓首窮年終無由得其髣彿聖宋龍興異人間出紫玄眞人張公少遊辟雍夙禀靈骨立志精勤艱辛不替得道於青城丈人盡得金丹奥㫖罄其所遇發爲歌詠自名其書曰悟眞篇愚幼而讀之潛心深思徧參衆說無所發明或指爲丹竈之術或訛爲内御之說撫篇浩歎積年于兹有幸自天得遇紫陽仙翁陳公親傳悟眞適孫無名眞人釋義密以見授焚盥莊誦恍然如霧散雲收日明月朗口訣心要未敢叩擊已知生天生地之機運行日月之道與夫長養萬物陶鑄群生不出於眞陰眞陽上下二弦之氣至於運用抽添防危慮險燦燦然在目睫間倘能遭遇眞傳得兹妙道生育胎仙超凡入聖諒不虚度此生甫得入手踴躍欣慶敬依泓穎題諸卷末時聖宋嘉泰甲子中秋白雲子謹叙悟眞篇本末事蹟張眞人本末紫陽眞人乃天台纓絡街人先名伯端字平叔後名用成少無名不學浪迹雲水晚傳混元之道未備孜孜訪問徧歷四方熙寧中陸公龍圖鋭鎮成都乃依以遊蜀任四川節度制置使安撫司參議於己酉歲遂遇異人傳火候之祕其道乃成仍戒之曰他日有與汝脱韁鎖者當受之既而三傳每罹灾患仍深自悔責遁世忘言著悟眞篇八十一章盡述二丹之祕其議論大㫖則深嫉世之學者專門各宗三教異流不能混一矣異派同源之理通亮繼正力補於道天下傳誦之陸公其蜕得其舍利千百若雞頭實者色皆紺碧既而復有見之者云政和中通姓名以謁黄君冕仲尚書於延平黄公素傳容成之道且酷嗜爐火年加耄矣語不契而去繼而使人寓書於黄叙述甚異其孫銓見其書祕不盡言獨告予大略云平叔自謂與黄皆紫微天官號九皇眞人因校劫運之籍遂謫於人間今垣中可見者六星而已潛耀者三平叔冕仲洎維揚于先生也平叔曰紫陽眞人冕仲曰紫元眞人于公曰紫華眞人一時被譴者官吏皆已復於清都矣今平叔又登仙品獨冕沉淪於宦海凡當爲人者十世今九世矣來世苟復迷妄合塵則淪墜異趣無復升遷之期平叔明序仙契力欲振拔而黄公竟不契而没惟自號曰紫元翁而已九皇不載於天官蓋微星也非常名而可名者在萬二千五百之間耶薛紫賢事蹟道源姓薛名式陜府雞足山人也嘗爲僧法號紫賢雲遊長安留開福寺參長老修嚴嚴與道眼因縁金雞未鳴如何後這音響又參僧如環如何是超佛祖之啖糊餅圓陀陀地聞桔橰頓有省悟有頌曰軋軋相從響發時不從他得豁然知桔橰說得無生曲井底沉蛇舞柘枝二老然之自爾頓悟無上祕密圓明眞實法要機鋒迅速宗說兼通且復雅志金丹道養崇寧丙戌歲冬寓郿縣青鎮聽講佛事適遇鳳翔府扶風縣杏林驛人石泰宇得之年八十五矣緑髮朱顔神宇不凡夜事縫紉道源密察焉心因異之偶舉張平叔詩曲石攫然曰識斯人乎曰吾師也遂將語着於平叔者平叔先生舊名伯端始於成都宿天回寺遇異人改名用成鳳州太守怒按以事坐黥竄經由邠境會天大雪與護送者俱飲酒村肆吾適肆中既揖而坐見邀同席吾笑顧此衆客方懽彼客未成飲盍來相就於是會飲酒酣問其故且以告吾念之曰邠守故人也樂善忘勢不遠百里能迂玉趾有因縁可免此行平叔懇諸護送者許之諾遂復丁邠吾爲之先一見獲免平叔德之曰此恩不報豈人也哉子平生學道無所得聞今將丹法用傳于子以成道吾再拜謝仰受付囑道源源聞石泰說是語已稽首皈依請因受業卒學大丹及復受得口訣眞要且戒往通邑大都依有德有力者可即圖之道源遂來京師棄僧伽梨幅巾縫掖和光同塵混於常俗覬了此事豈患學仙道流得遇平叔詩曲隨其所見致有差殊而意之所疑又須展轉心生迷謬莫能曉悟孰從而語之參同哉致使不敢下手修鍊者多矣嗚呼豈平叔先生之本心哉於是慨然首爲訓釋條達宗㫖通玄究微開蒙發昧人可率解俾修鍊者無或差誤得證高眞作丹砂用初平叔先生嘗因獲罪誓不語人已而歎曰自爲計得矣非所以爲道也太上玄科曰遇人不傳失天道妄傳非人泄天寶傳得其人身有功妄傳七祖受冥考我今靳固閉天道也禍將大矣不得已述詩曲始以流傳世之奇人使讀之自悟詩曲中之意亦隱深不可識道源因以推廣其意爲註解明白眞要洞闡玄微法事悉備表裏焕然餘藴無所藏矣然獲覽者得以尋詳釋其疑惑不伺咨聞能自了了所以成平叔先生之志也然而道源既欲以是垂世傳後則亦將緘默自此隱矣獲斯文者宜加祕密天之所寶在在處處自有神物營衛護持若有志士信道明眞言行無玷審是修行然後付焉金玉堆裏不可傳焉父子至親亦勿與之蓋輕泄慢漏身則受殃門户有灾子孫不祥豈止如是又將禍延九玄七祖陰譴冥責長役鬼官永不受生念兹慎兹無忽商丘老圃今是翁元王眞一既繕寫註解悟眞篇詩曲並與當時承受事蹟因編詳記於後雖言不文飾而直書實録庶幾備見本末云政和歲次乙未中秋日記泰定丁卯在瑞陽見薛紫賢註悟眞篇讀之惘然恨未見全本天曆癸巳歸昇獲全本反復讀之數年見其端倪繼蒙遠方道友寄至數本勘讎皆同註文所駁傍門或本作或者或本作葉文叔此其疑也近刊行悟眞篇解諸家節文其中所引象川翁無名子二人之註比之所獲紫賢之註又皆同疑其文同而人異此疑也宋嘉泰壬戌袁公輔斥文叔註疏混殽難考因選擇其註究公輔所受之道亦不過獨修一物又何斥他人哉文叔之果是哉何紫賢公輔皆斥之此其疑也因以年月考之道光作復命篇自叙宣和庚子歲得遇至人口訣今之商丘今是翁元王眞一在政和乙未記薛紫賢事蹟葉文叔註在紹興三十一年辛巳相隔四十七年文叔於政和乙未或未生或童幼安得紫賢於四十七年之前豫指名而斥之者又皆文叔之眞謬非他人所註此其疑也以是數疑疑其非紫賢之註而未决然其所註與諸家不同而實得眞人之㫖至順辛未五月初三日得遇金丹藥物火候直訣天授之也終疑其非紫賢所註於心未釋參問不已旁求四方至順壬申秋武陵故友傳至象川翁葆光解喜躍不已讀之累月則前之所疑涣然冰釋確然如世傳紫賢之註實爲無名子之註迷以葆光訛爲道光何其訛傳之乆而人未之訂耶何以言之眞人傳石杏林杏林傳紫賢爲第三傳此世之知也眞人傳廣益子廣益子傳無名子亦爲第三傳此世之罕知也好事者欲其所註取信當世遂節無名子之註以傳流之顯者知紫賢附於後以實之記者曰元王眞一安有元王之姓是自訛其記述之名以惑世也或者又曰紫賢爲僧一名道光一名葆光是又以光宇之同而訛以二人爲一人也其指斥葉文叔者今以無名子之註考之前乎文叔未有註悟眞篇者後乎文叔未有斥文叔之非者無名子恐其失眞人之㫖迷誤後人於乾道癸巳冒犯天譴謹依師㫖註解篇義毫分縷析惟恐人迷可謂仁慈之普盡泄天機者矣世人節録諸解未見全文又訛翁姓爲老者之稱分象川翁無名子爲二人近又訛無名子之註爲紫賢之註訛以傳訛於其文義年月尚不能參考其妄安望其知仙道之眞傳也哉金丹大道之的傳乆矣其絶矣今四海混一學仙紛紛求其一二能聞是道者何其寥寥也抑紫賢此註不傳於後世乎將予孤寡而未見乎今無名子之註詳盡而無留藴世傳紫賢之註大同而多闕略假使紫賢有註無名子安得不援其文而反竊其全文而易以己名而傳世乎無名子於釋月圓之義止引紫賢二語可見紫賢之未有註也今訛爲紫賢之註者於始於有作人事覺之註及引無是子曰無是即無名之訛也可見紫賢之未嘗有註也今之學仙者未可以紫賢顯知無名罕知以重爲輕也然其師傳之眞仙道之正二仙皆同也皆傳之自平叔眞人斯文所在端有神物營衛護持安得不寶其文而珍藏之擇其人而流傳之因並附所記眞人本末及紫賢事迹於無名子註文之後而通辨之庶得斯註疏者理易明訛易革知吾言之不妄不敢訛傳其註也知大道之難聞不敢輕傳非人也學仙有縁因文解義因註達㫖不迷傍門直超大道天之所賜則金丹大道未嘗絶傳矣世之又傳别本有淳熙改元九月子虚子小序在陳紫陽序之前其於無名子之序節去謹依仙翁之祕㫖一段又易其後文分三乘祕要論名貫卷首其於註文增又曰其說之要以童男童女爲陰陽龍虎男女之氣爲先天後天爲鉛汞爲眞水火爲初弦當天癸之年爲癸生二八爲三陽備爲蟾光圓爲金鼎完爲大小無傷爲兩國全爲先天氣爲外藥誠可謂邪宗曲派而妄註之也乃子虚子之邪宗故不敢顯姓名又冒先書其年月託以無名子未言㫖取於世或曰子虚子即無名子之異號曰審如是則無名子自相矛盾矣且乾道癸巳次年甲午改元淳熙一年之間師㫖遽異何以言之嘉泰甲子白雲子序陳紫陽始傳斯註相詎三十二年註文全然純一祕㫖坦然明白無一宇邪說以揉雜之癸巳至甲午相詎期月即畔前註當是時無名子未仙去倘見聞之必以爲邪宗而攻之矣豈有攻葉文叔而守子虚子者乎且子虚子何不就有道以正使其傳果正邪無名子必自增改又何以爲增無名子未言之㫖乎是以知其妄註也審矣學仙之士有縁獲斯註之眞者幸明鑑而珍襲之至元丙子中元空玄子戴起宗仲同父謹辨我聞在昔有若紫賢眞人闡大道之希微拯迷徒之淪溺道成之日著悟眞篇以傳于世蓋平生之所歷萃於此矣學道者不率是篇之所言譬猶適江海而離楫也奈何世遠風微言厖道隱堅執傍門以毁仙道深蔽法象以非眞詮由此以神仙爲渺茫丹書爲漫誕而悟眞之書眞人之心竟莫克明于世乃若無名子接夫正傳之緒念其註者訛以傳訛復以此書註行于世章分句釋畦疏町别盡泄天機備載其中熟玩精思當自得也叔祖父自稚齡慕道讀之有年天啓其衷與聞玄祕以平日所聞於父師所授者與夫己之所自得者疏於無名子註文之末俾來者得以取準焉不至墮於渺茫而流于誕漫也溥哉其心乎順夙生有縁獲闚其書寔爲慶幸又安得友方外之人踏名巘以棲眞策仙風而遐詣安立鼎爐呼吸龍虎顛倒汞鉛採之於一時胎之於十月空之於九載泠然馭飛車度弱水跨靈鰲侍諸仙眞之下風以聞希夷之大道以拯淪溺之徒乃所願則學紫賢也至元丁丑上巳日後學戴順稽首書于朱湖大生洞天金丹法象無名子於悟眞篇註攢集金丹法象比喻衆名可謂備矣起宗推廣裒集參同契及諸仙經論詩詞凡所假借天道易象人事理物比喻金丹陰陽法象分爲七類附於悟眞篇註之下庶學仙者易於參究知夫内外同異之分互爲法象五行變化之序難以定名明其本源之一契其同有之實辨其異喻之名則仙師之明皆可以一貫之得於此而忘眞筌由於此而成仙道亦非小補云至元丁丑上元戴起宗序陽天日參乾離父夫君主婦性氣神冠魂目火南甲午丙二七心花玉龍蛇雄牡虚氣上轂物器矩要汞輕浮精字戊大動表兔剛赤呼無竒德禮喜賞男晝暑天魂乾象日魂張翼房六上弦乾馬震龍扶桑崑崙姹女長男木婿戊土二南地二朱砂曾青青龍火龍海龍赤鳳乾爐玉鼎玉池下德恍惚眞砂朱雀丹陽朱砂鼎生於甲乙陰地月商坤坎母婦臣賔夫情精命昏魄耳水北庚子壬一六腎酒金虎龜雌牝實液下軸藥鼎規流鉛重沉光鳴巳小靜裏烏柔黑吸有耦刑智怒罰女夜寒地魄坤象月魄虚危昴七下弦坤牛坎虎華嶽曲江嬰兒少女金妻己土一北天一黑鉛山澤白虎水虎嶽虎黑龜坤鼎金爐西川上德杳冥眞汞玄武眞陰偃月爐生於庚辛陽中陰震離妻臣賓卯甲東情仁左三八浮肝木女物父日魂烏髓姹女人民賓客青娥離女眞汞木液火汞黄芽玉液神水火龍牝龍金烏眞龍眞陰雌母雌陰陰火陽氣流珠女青雌火紅鉛朱砂交梨東二玉芝丹基眞火午北龍西水銀天玄女日中烏母之血龍弦氣龍呼虎陰白火火中水紅入黑赤鳳髓流汞父紅鉛精砂裏汞離之己坤之中女離中一陰山頭月白太陽流珠離己日光青衣女子碧眼胡兒女混男形砂中眞汞氣中取水雄裏藏雌烏肝八兩砂中生汞生於丙丁氣中生液二八姹女杳冥之精恍惚中物朱砂鼎内水銀下弦水半斤汞爲砂中水陰中陽兊坎夫君主酉庚西性義右四九沉肺金男藥母月魄兔脂金翁父母主人老郎坎男眞鉛金精水金白雪金液華池水虎雄虎玉兔眞虎眞陽雄父雄陽陽水陰精金華男白雄金黑鉛水銀火棗西四刀圭丹母眞水子南虎東玉蕊地黄男月中兔父之精虎弦氣虎吸龍黄芽鉛水中火黑入紅黑龜精黄金母黑鉛髓水中銀坎之戊乾之中男坎中一陽潭底日紅北方河車坎戊月精素練郎君白頭老子男兼女體鉛中眞銀水中取氣黑中有白兔髓半斤鉛内産砂生於壬癸液中生氣九三郎君恍惚之物杳冥中精偃月爐中玉蕊上弦金半斤金爲水中砂中宫土中五十信意脾祖眞土土德土釜元神神寶玄關玄門眞鉛金母金妃金胎金鼎鉛鼎汞鼎崑崙大冶乾宫坤位華池神胎神廬母舍戊己靈根聖胎靈户太淵規中辰極混沌丹房氣府關元丹田絳宫黄庭黄婆黄道元中玄竅藥母丹基冰壺函三星官母胎北海空玄黄家歸根竅復命關偃月爐懸胎鼎玄牝門戊己門造化爐造化機交感穴太乙爐神氣穴守一壇中黄官丹元府丹樞紐黄金母希夷府衆妙門太微官混沌門生殺舍黄帝土德黄中通理后土神鼎先天地生混沌金鼎黑白相符既濟鼎器法象天地皇上地德先天金胎神水華池類如雞子呼吸之根玄牝之門天地之根凝結之所皇石父母造化全窟外藥陽君金母虎鐵主鉛親君德金爲眞鉛陰火金精麻姑陽丹眞土眞一眞水神水大丹大藥金丹七返九還秋石金華嬰兒眞人谷神刀圭大定子珠甘露黄芽玄珠玄霜黍珠聖胎玉蕊金砂黄礐黄池外丹陽精水虎先天氣眞種子眞玄牝三五一摩泥珠中央土眞父母眞陰陽天五賊紫金霜玉壺冰絳雪丹眞一精第一鼎皇酥長生藥白馬牙天地髓坎離精眞一水水中金水裏鉛眞主人九轉丹天生芽自然體乾坤精天地氣陰里陽精先天地精赫赫金精天地靈根陰陽聖母乾坤鼎器坎離藥物神符白雪壺中日月龍池大丹宇寅之主雪山醍醐坎位中心實聖父靈母之氣混元眞一陽天地陰陽長生眞精天地混沌之根太乙含眞氣坤位生成體内藥陰臣木子龍磁賔汞踈家臣兔兒眞汞陽火木液張騫陰汞眞火雪胎嬰兒内丹陰丹玄珠火龍後天氣己汞火天地子氣陽裏陰精元陽之氣金液還丹陰中陽火離官腹内金液大還東陽造化爐靈胎中神室靈胎中鉛汞紫陽眞人悟眞直指詳說三乘秘要
